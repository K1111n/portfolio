<section class="reference-section">
  <div class="container">
    <div class="testimonial-slider">
      <img src="/assets/references/quote-icon.png" alt="quote" class="quote-icon" />

      <div class="testimonial-card">
        <div class="testimonial-content">
          <p class="testimonial-text">
            {{ currentTestimonial.text }}
          </p>
          <div class="testimonial-author">
            <div class="author-name">{{ currentTestimonial.author }}</div>
          </div>
        </div>
      </div>

      <div class="profile-wrapper">
        <div class="profile-border"></div>
        <div class="profile-image">
          <img [src]="currentTestimonial.image" [alt]="currentTestimonial.author" />
        </div>
      </div>

      <div class="green-line"></div>
    </div>

    <div class="slider-navigation">
      <button class="arrow-btn prev" (click)="previousSlide()">
        <img src="/assets/i18n/references/leftArrow.png" alt="previous" class="arrow-default" />
        <img src="/assets/i18n/references/leftArrowHovered.png" alt="previous" class="arrow-hover" />
      </button>

      <div class="slider-dots">
        <span
          *ngFor="let testimonial of testimonials; let i = index"
          class="dot"
          [class.active]="i === currentIndex"
          (click)="goToSlide(i)"
        ></span>
      </div>

      <button class="arrow-btn next" (click)="nextSlide()">
        <img src="/assets/i18n/references/rightArrow.png" alt="next" class="arrow-default" />
        <img src="/assets/i18n/references/rightArrowHovered.png" alt="next" class="arrow-hover" />
      </button>
    </div>
  </div>
</section>
